<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Psychometrician Reviewer</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<header class="header">

    <div class="logo">

        🧠 Langling Reviewer

    </div>

    <div class="header-actions">

        <button id="darkModeBtn"
                class="icon-btn">

            🌙

        </button>

        <button id="settingsBtn"
                class="icon-btn">

            ⚙

        </button>

    </div>

</header>

<main>

    <!-- Dashboard -->
    <section id="dashboard"></section>

    <!-- Quiz -->
    <section id="quizScreen"
             class="hidden">

        <div class="quiz-header">

            <div>

                <h2 id="subjectTitle"></h2>

                <p id="questionCounter"></p>

            </div>

            <div id="timer">

                02:00:00

            </div>

        </div>

        <div class="progress">

            <div id="progressFill"></div>

        </div>

        <div class="quiz-card">

            <h2 id="question"></h2>

            <div id="choices"></div>

            <div id="feedback"
                 class="feedback"></div>

        </div>

        <div class="navigation">

            <button id="prevBtn">

                ← Previous

            </button>

            <button id="nextBtn">

                Next →

            </button>

        </div>

        <div id="palette"></div>

    </section>

    <!-- Results -->
    <section id="resultScreen"
             class="hidden">

    </section>

</main>

<!-- Question Data -->


<script src="js/utils.js"></script>
<script src="js/statistics.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/timer.js"></script>
<script src="js/mockexam.js"></script>
<script src="js/storage.js"></script>
<script src="js/bookmarks.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/quiz.js"></script>
<script src="js/review.js"></script>
<script src="js/app.js"></script>
<script src="js/export.js"></script>
</body>

</html>
